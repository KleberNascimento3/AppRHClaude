<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Dívidas')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area">

    <div th:each="cooperado : ${cooperado}">

      <!-- Header -->
      <div class="page-header">
        <div>
          <h1 class="page-title">Dívidas</h1>
          <small>
            <span th:text="${cooperado.coopnome}"></span>
            &nbsp;·&nbsp; Matrícula: <strong th:text="${cooperado.coopmatricula}"></strong>
          </small>
        </div>
        <div class="d-flex gap-2">
          <a th:href="@{/cooperado/editarDividas/{matricula}(matricula=${cooperado.coopmatricula})}"
             class="btn btn-outline-primary btn-sm">
            <i class="bi bi-pencil"></i> Editar dívidas
          </a>
          <a th:href="${(#mvc.url('CC#detalhesCooperado').arg(0, cooperado.coopmatricula)).build()}"
             class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Voltar
          </a>
        </div>
      </div>

      <!-- Table -->
      <div class="card table-card">
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Forma de Pagamento</th>
                <th>Vencimento</th>
                <th>Data de Pagamento</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="divida : ${dividas}">
                <td th:text="${divida.coopdescricao}"></td>
                <td>
                  <span class="fw-semibold" th:text="${{divida.coopvalor}}"></span>
                </td>
                <td th:text="${divida.coopformapagto}"></td>
                <td th:text="${divida.coopdatavencimento}"></td>
                <td th:text="${divida.coopdatapagamento}"></td>
                <td>
                  <span th:if="${divida.coopdatapagamento == null}"
                        class="badge" style="background:#fef2f2;color:#ef4444">
                    <i class="bi bi-clock me-1"></i>Pendente
                  </span>
                  <span th:unless="${divida.coopdatapagamento == null}"
                        class="badge" style="background:#f0fdf4;color:#16a34a">
                    <i class="bi bi-check-circle me-1"></i>Pago
                  </span>
                </td>
              </tr>
              <tr th:if="${dividas == null or #lists.size(dividas) == 0}">
                <td colspan="6">
                  <div class="empty-state">
                    <i class="bi bi-receipt"></i>
                    <p>Nenhuma dívida encontrada.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Total -->
        <div th:if="${soma != null and soma > 0}"
             class="pagination-wrapper justify-content-end">
          <div class="d-flex align-items-center gap-2">
            <span class="text-muted">Total pendente:</span>
            <strong style="font-size:1.1rem;color:#ef4444"
                    th:text="${#numbers.formatCurrency(soma)}"></strong>
          </div>
        </div>
      </div>

    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
