<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/head :: head('Detalhes do Cooperado')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div th:insert="~{fragments/modal-confirm :: modalConfirm}"></div>

<!-- Modal: Adicionar Telefone -->
<div class="modal fade" id="modalTelefone" tabindex="-1" aria-labelledby="modalTelefoneLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:14px;border:none">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="modalTelefoneLabel">
          <i class="bi bi-telephone-plus-fill text-primary me-2"></i>Adicionar Telefone
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body pt-0">
        <div th:each="cooperado : ${cooperado}">
          <form method="post" th:object="${telefone}" data-loading>
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label" for="telefoneInput">Número</label>
                <input type="text" id="telefoneInput" name="cooptelnumero"
                       class="form-control" placeholder="(99) 99999-9999" required/>
              </div>
              <div class="col-12">
                <label class="form-label" for="coopteltipo">Tipo</label>
                <select name="coopteltipo" id="coopteltipo" class="form-select" required>
                  <option value="">Escolher...</option>
                  <option value="RESIDENCIAL">Residencial</option>
                  <option value="CELULAR">Celular</option>
                  <option value="COMERCIAL">Comercial</option>
                </select>
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-4">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> Adicionar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="content-area">

    <div th:each="cooperado : ${cooperado}">

      <!-- Header -->
      <div class="page-header">
        <div class="d-flex align-items-center gap-3">
          <!-- Photo -->
          <div class="cooperado-avatar">
            <img th:src="@{|/uploads/${cooperado.coopmatricula}.jpg|}"
                 th:alt="${cooperado.coopnome}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span style="display:none;width:100%;height:100%;background:#e2e8f0;align-items:center;justify-content:center;border-radius:10px;font-size:2rem;color:#94a3b8">
              <i class="bi bi-person-fill"></i>
            </span>
          </div>
          <div>
            <h1 class="page-title" th:text="${cooperado.coopnome}">Nome</h1>
            <small>
              Matrícula: <strong th:text="${cooperado.coopmatricula}"></strong>
              &nbsp;·&nbsp;
              Apelido: <span th:text="${cooperado.coopnomeguerra}"></span>
            </small>
          </div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <a th:href="${(#mvc.url('CC#editarCooperado').arg(0, cooperado.coopmatricula)).build()}"
             class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-pencil"></i> Editar
          </a>
          <a href="/cooperados" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Voltar
          </a>
        </div>
      </div>

      <!-- Quick Action Buttons -->
      <div class="d-flex gap-2 flex-wrap mb-4">
        <a th:href="${(#mvc.url('CC#coopcadastro').arg(0, cooperado.coopmatricula)).build()}"
           class="btn btn-outline-primary btn-sm">
          <i class="bi bi-card-text"></i> Dados Cadastrais
        </a>
        <a th:href="${(#mvc.url('CC#coopendereco').arg(0, cooperado.coopmatricula)).build()}"
           class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-geo-alt"></i> Endereço
        </a>
        <a th:href="${(#mvc.url('CC#divida').arg(0, cooperado.coopmatricula)).build()}"
           class="btn btn-outline-danger btn-sm">
          <i class="bi bi-receipt"></i> Dívidas
        </a>
        <a th:href="${(#mvc.url('CC#cota').arg(0, cooperado.coopmatricula)).build()}"
           class="btn btn-outline-success btn-sm">
          <i class="bi bi-pie-chart"></i> Cota Parte
        </a>
      </div>

      <!-- Tabs -->
      <div class="card">
        <div class="card-body p-0">
          <ul class="nav nav-tabs px-3 pt-2" id="cooopTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="tab-geral" data-bs-toggle="tab"
                      data-bs-target="#pane-geral" type="button" role="tab">
                <i class="bi bi-person-fill me-1"></i> Dados Gerais
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="tab-telefones" data-bs-toggle="tab"
                      data-bs-target="#pane-telefones" type="button" role="tab">
                <i class="bi bi-telephone me-1"></i> Telefones
                <span th:if="${telefones != null}"
                      class="badge bg-primary bg-opacity-10 text-primary ms-1"
                      th:text="${#lists.size(telefones)}">0</span>
              </button>
            </li>
          </ul>

          <div class="tab-content p-3 p-md-4" id="coopTabsContent">

            <!-- Tab: Dados Gerais -->
            <div class="tab-pane fade show active" id="pane-geral" role="tabpanel">
              <div class="row g-4">
                <div class="col-md-6">
                  <div class="form-section-title">Identificação</div>
                  <dl class="row mb-0" style="font-size:.875rem">
                    <dt class="col-5 text-muted fw-normal">Matrícula</dt>
                    <dd class="col-7 fw-semibold" th:text="${cooperado.coopmatricula}"></dd>
                    <dt class="col-5 text-muted fw-normal">Nome</dt>
                    <dd class="col-7" th:text="${cooperado.coopnome}"></dd>
                    <dt class="col-5 text-muted fw-normal">Apelido</dt>
                    <dd class="col-7" th:text="${cooperado.coopnomeguerra}"></dd>
                  </dl>
                </div>
                <div class="col-md-6">
                  <div class="form-section-title">Foto</div>
                  <div style="display:flex;align-items:center;gap:1rem">
                    <div class="cooperado-avatar" style="width:100px;height:100px;border-radius:12px">
                      <img th:src="@{|/uploads/${cooperado.coopmatricula}.jpg|}"
                           th:alt="${cooperado.coopnome}"
                           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                      <span style="display:none;width:100%;height:100%;background:#e2e8f0;align-items:center;justify-content:center;border-radius:10px;font-size:2.5rem;color:#94a3b8">
                        <i class="bi bi-person-fill"></i>
                      </span>
                    </div>
                    <a th:href="${(#mvc.url('CC#editarCooperado').arg(0, cooperado.coopmatricula)).build()}"
                       class="btn btn-outline-secondary btn-sm">
                      <i class="bi bi-camera"></i> Alterar foto
                    </a>
                  </div>
                </div>
              </div>
            </div>

            <!-- Tab: Telefones -->
            <div class="tab-pane fade" id="pane-telefones" role="tabpanel">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-section-title mb-0">Telefones cadastrados</div>
                <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalTelefone">
                  <i class="bi bi-plus-lg"></i> Adicionar
                </button>
              </div>

              <div th:if="${telefones != null and #lists.size(telefones) > 0}">
                <div class="table-responsive">
                  <table class="table">
                    <thead>
                      <tr>
                        <th>Número</th>
                        <th>Tipo</th>
                        <th class="table-actions">Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="telefone : ${telefones}">
                        <td>
                          <i class="bi bi-telephone me-1 text-muted"></i>
                          <span th:text="${telefone.cooptelnumero}"></span>
                        </td>
                        <td>
                          <span class="badge bg-secondary bg-opacity-10 text-secondary fw-normal"
                                th:text="${telefone.coopteltipo}"></span>
                        </td>
                        <td class="table-actions">
                          <a th:href="${(#mvc.url('CC#deletarTelefone').arg(0, telefone.cooptelindexcod)).build()}"
                             data-confirm-delete="este telefone"
                             class="btn btn-sm btn-outline-danger" title="Excluir">
                            <i class="bi bi-trash3"></i>
                          </a>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div th:if="${telefones == null or #lists.size(telefones) == 0}" class="empty-state">
                <i class="bi bi-telephone-x"></i>
                <p>Nenhum telefone cadastrado. Clique em "Adicionar" para incluir.</p>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div><!-- /th:each cooperado -->

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
<script>
  /* Phone mask without jQuery */
  document.getElementById('telefoneInput')?.addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
    else if (v.length > 6)  v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
    else if (v.length > 2)  v = v.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
    else if (v.length > 0)  v = v.replace(/^(\d{0,2})$/, '($1');
    this.value = v;
  });
</script>
</body>
</html>
