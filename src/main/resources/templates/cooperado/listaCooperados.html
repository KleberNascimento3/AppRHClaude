<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/head :: head('Cooperados')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div th:insert="~{fragments/modal-confirm :: modalConfirm}"></div>

<div class="main-content">
  <div class="content-area">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Cooperados</h1>
        <small>Gerencie os cooperados cadastrados</small>
      </div>
      <a href="/cadastrarCooperado" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Novo Cooperado
      </a>
    </div>

    <!-- Search -->
    <form method="post" class="search-box" data-loading>
      <div>
        <label class="form-label">Status</label>
        <select name="coopnome" id="coopnome" class="form-select" style="min-width:160px">
          <option value="">Todos</option>
          <option value="all">Todos</option>
          <option value="ativos">Ativos</option>
          <option value="inativos">Inativos</option>
        </select>
      </div>
      <div style="flex:1;min-width:200px">
        <label class="form-label">Buscar</label>
        <input class="form-control" type="search"
               placeholder="Matrícula, nome ou apelido..."
               name="buscar" id="buscar">
      </div>
      <button class="btn btn-primary" type="submit" style="align-self:flex-end">
        <i class="bi bi-search"></i> Pesquisar
      </button>
    </form>

    <!-- Table -->
    <div class="card table-card">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Matrícula</th>
              <th>Nome</th>
              <th>Apelido</th>
              <th style="text-align:center" title="Recebe Ligação">Ligação</th>
              <th style="text-align:center" title="WhatsApp">WhatsApp</th>
              <th style="text-align:center" title="Correspondência">Correio</th>
              <th class="table-actions">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="cooperado: ${cooperados}"
                th:attr="data-cooperado-id=${cooperado.coopmatricula}">
              <td>
                <a th:href="${(#mvc.url('CC#detalhesCooperado').arg(0, cooperado.coopmatricula).build())}"
                   class="fw-semibold" th:text="${cooperado.coopmatricula}"></a>
              </td>
              <td th:text="${cooperado.coopnome}"></td>
              <td>
                <span class="badge bg-secondary bg-opacity-10 text-secondary fw-normal"
                      th:text="${cooperado.coopnomeguerra}"></span>
              </td>
              <td style="text-align:center">
                <input class="form-check-input lgpd" data-lgpd="ligacao" type="checkbox"
                       th:checked="*{cooperado.lgpd.isCoopligacao()}"/>
              </td>
              <td style="text-align:center">
                <input class="form-check-input lgpd" data-lgpd="whatsapp" type="checkbox"
                       th:checked="*{cooperado.lgpd.isCoopwhatsapp()}"/>
              </td>
              <td style="text-align:center">
                <input class="form-check-input lgpd" data-lgpd="correio" type="checkbox"
                       th:checked="*{cooperado.lgpd.isCoopcorreio()}"/>
              </td>
              <td class="table-actions">
                <a th:href="${(#mvc.url('CC#detalhesCooperado').arg(0, cooperado.coopmatricula).build())}"
                   class="btn btn-sm btn-outline-primary" title="Ver detalhes">
                  <i class="bi bi-eye"></i>
                </a>
                <a th:href="${(#mvc.url('CC#editarCooperado').arg(0, cooperado.coopmatricula)).build()}"
                   class="btn btn-sm btn-outline-secondary" title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <a th:href="${(#mvc.url('CC#deletarCooperado').arg(0, cooperado.coopmatricula)).build()}"
                   th:attr="data-confirm-delete=${cooperado.coopnome}"
                   class="btn btn-sm btn-outline-danger"
                   sec:authorize="hasRole('ROLE_DEVELOPER')"
                   title="Excluir">
                  <i class="bi bi-trash3"></i>
                </a>
              </td>
            </tr>
            <tr th:if="${cooperados == null or #lists.size(cooperados) == 0}">
              <td colspan="7">
                <div class="empty-state">
                  <i class="bi bi-person-badge"></i>
                  <p>Nenhum cooperado encontrado.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div th:if="${totalPages != null and totalPages > 1}" class="pagination-wrapper">
        <span>Total: <strong th:text="${totalItems}">0</strong> registros</span>
        <nav>
          <ul class="pagination pagination-sm">
            <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
              <a class="page-link"
                 th:href="@{'/cooperados/' + ${currentPage - 1} + '/' + ${contextPath}}">&laquo;</a>
            </li>

            <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
              <li class="page-item" th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link"
                   th:href="@{'/cooperados/' + ${i} + '/' + ${contextPath}}"
                   th:text="${i}"></a>
              </li>
            </th:block>

            <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
              <a class="page-link"
                 th:href="@{'/cooperados/' + ${currentPage + 1} + '/' + ${contextPath}}">&raquo;</a>
            </li>
          </ul>
        </nav>
        <span>Página <strong th:text="${currentPage}">1</strong> de <strong th:text="${totalPages}">1</strong></span>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
