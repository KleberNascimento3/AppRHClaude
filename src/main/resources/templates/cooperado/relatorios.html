<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Relatorios')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area">

    <div class="page-header">
      <div>
        <h1 class="page-title">Relatorios</h1>
        <small>Visualize e baixe os PDFs do sistema</small>
      </div>
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card table-card h-100">
          <div class="card-header">
            <i class="bi bi-file-earmark-pdf"></i> Opcoes
          </div>
          <div class="list-group list-group-flush">
            <button class="list-group-item list-group-item-action active" type="button" data-pdf="/relatorios/pdf/cooperados?status=ativos&acao=v" data-download="/relatorios/pdf/cooperados?status=ativos&acao=d" data-title="Cooperados ativos">
              Cooperados ativos
            </button>
            <button class="list-group-item list-group-item-action" type="button" data-pdf="/relatorios/pdf/cooperados?status=todos&acao=v" data-download="/relatorios/pdf/cooperados?status=todos&acao=d" data-title="Todos os cooperados">
              Todos os cooperados
            </button>
            <button class="list-group-item list-group-item-action" type="button" data-pdf="/relatorios/pdf/cooperados?status=inativos&acao=v" data-download="/relatorios/pdf/cooperados?status=inativos&acao=d" data-title="Cooperados inativos">
              Cooperados inativos
            </button>
            <button class="list-group-item list-group-item-action" type="button" data-pdf="/relatorios/pdf/etiquetas?status=ativos&acao=v&modelo=20" data-download="/relatorios/pdf/etiquetas?status=ativos&acao=d&modelo=20" data-title="Etiquetas A4 - 20 por folha">
              Etiquetas A4 - 20 por folha
            </button>
            <button class="list-group-item list-group-item-action" type="button" data-pdf="/relatorios/pdf/etiquetas?status=ativos&acao=v&modelo=14" data-download="/relatorios/pdf/etiquetas?status=ativos&acao=d&modelo=14" data-title="Etiquetas A4 - 14 por folha">
              Etiquetas A4 - 14 por folha
            </button>
          </div>
          <div class="card-body border-top">
            <label class="form-label" for="matriculasEtiquetas">Matriculas para etiquetas</label>
            <input id="matriculasEtiquetas" class="form-control form-control-sm" type="text" placeholder="Ex.: 123,167,286,772">
          </div>
          <div class="card-body d-flex gap-2">
            <a id="abrirPdf" href="/relatorios/pdf/cooperados?status=ativos&acao=v" target="_blank" class="btn btn-outline-primary btn-sm flex-fill">
              <i class="bi bi-box-arrow-up-right"></i> Abrir PDF
            </a>
            <a id="baixarPdf" href="/relatorios/pdf/cooperados?status=ativos&acao=d" class="btn btn-primary btn-sm flex-fill">
              <i class="bi bi-download"></i> Baixar
            </a>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card table-card">
          <div class="card-header d-flex align-items-center justify-content-between">
            <strong id="tituloPreview">Cooperados ativos</strong>
            <button id="imprimirPdf" class="btn btn-sm btn-outline-secondary" type="button">
              <i class="bi bi-printer"></i> Imprimir
            </button>
          </div>
          <div style="height:72vh;min-height:520px;background:#f8fafc">
            <iframe id="pdfPreview"
                    title="Visualizacao do relatorio"
                    src="/relatorios/pdf/cooperados?status=ativos&acao=v"
                    style="width:100%;height:100%;border:0;background:white"></iframe>
          </div>
        </div>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
<script>
(function () {
  const botoes = document.querySelectorAll('[data-pdf]');
  const preview = document.getElementById('pdfPreview');
  const abrir = document.getElementById('abrirPdf');
  const baixar = document.getElementById('baixarPdf');
  const titulo = document.getElementById('tituloPreview');
  const imprimir = document.getElementById('imprimirPdf');
  const matriculas = document.getElementById('matriculasEtiquetas');

  function montarMatriculas(botao) {
    if (!botao.getAttribute('data-pdf').includes('/etiquetas')) {
      return '';
    }
    const valor = matriculas.value.trim();
    return valor ? '&matriculas=' + encodeURIComponent(valor) : '';
  }

  function aplicarBotao(botao, atualizarPreview) {
    const baseUrl = botao.getAttribute('data-pdf');
    const baseDownload = botao.getAttribute('data-download');
    const extra = montarMatriculas(botao);
    const url = baseUrl + extra;
    if (atualizarPreview) {
      preview.src = url + '&t=' + new Date().getTime();
    }
    abrir.href = url;
    baixar.href = baseDownload + extra;
    titulo.textContent = botao.getAttribute('data-title');
  }

  botoes.forEach(function (botao) {
    botao.addEventListener('click', function () {
      botoes.forEach(function (item) { item.classList.remove('active'); });
      botao.classList.add('active');
      aplicarBotao(botao, true);
    });
  });

  matriculas.addEventListener('input', function () {
    const ativo = document.querySelector('[data-pdf].active');
    if (ativo) {
      aplicarBotao(ativo, ativo.getAttribute('data-pdf').includes('/etiquetas'));
    }
  });

  imprimir.addEventListener('click', function () {
    preview.contentWindow.focus();
    preview.contentWindow.print();
  });
})();
</script>
</body>
</html>
