<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Cadastrar Cooperado')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area app-page-shell">
    <div class="page-header app-hero-header">
      <div>
        <span class="page-kicker">Cooperados</span>
        <h1 class="page-title">Novo Cooperado</h1>
        <small>Cadastro inicial com dados cadastrais, endereco, dividas, cota parte e telefones.</small>
      </div>
      <a href="/cooperados" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>

    <div class="workflow-card">
      <form method="post" data-loading>
        <ul class="nav nav-pills workflow-tabs" id="cooperadoTabs" role="tablist">
          <li class="nav-item"><button class="nav-link active" id="dados-cadastrais-tab" data-bs-toggle="tab" data-bs-target="#dados-cadastrais" type="button"><i class="bi bi-card-text"></i> Dados cadastrais</button></li>
          <li class="nav-item"><button class="nav-link" id="enderecos-tab" data-bs-toggle="tab" data-bs-target="#enderecos" type="button"><i class="bi bi-geo-alt"></i> Endereco</button></li>
          <li class="nav-item"><button class="nav-link" id="dividas-tab" data-bs-toggle="tab" data-bs-target="#dividas" type="button"><i class="bi bi-receipt"></i> Dividas</button></li>
          <li class="nav-item"><button class="nav-link" id="cota-parte-tab" data-bs-toggle="tab" data-bs-target="#cota-parte" type="button"><i class="bi bi-pie-chart"></i> Cota parte</button></li>
          <li class="nav-item"><button class="nav-link" id="telefones-tab" data-bs-toggle="tab" data-bs-target="#telefones" type="button"><i class="bi bi-telephone"></i> Telefones</button></li>
        </ul>

        <div class="tab-content workflow-tab-content">
          <div class="tab-pane fade show active" id="dados-cadastrais" role="tabpanel">
            <div class="form-section-heading"><div><span>Obrigatorio</span><h2>Dados cadastrais</h2></div><i class="bi bi-person-plus-fill"></i></div>
            <div th:each="cooperado: ${cooperados}" class="info-strip mb-3">
              <i class="bi bi-info-circle-fill"></i><div><span>Proxima matricula</span><strong th:text="${cooperado.coopmatricula}"></strong></div>
            </div>
            <div class="row g-3">
              <div class="col-12 col-lg-8"><label class="form-label" for="coopnome">Nome completo</label><input type="text" class="form-control form-control-lg" id="coopnome" name="coopnome" placeholder="Ex: Joao da Silva Souza" required></div>
              <div class="col-12 col-lg-4"><label class="form-label" for="coopnomeguerra">Apelido</label><input type="text" class="form-control form-control-lg" id="coopnomeguerra" name="coopnomeguerra" placeholder="Ex: Joao Silva" required></div>
            </div>
            <div class="d-flex justify-content-end mt-4"><button class="btn btn-primary" type="button" onclick="document.getElementById('enderecos-tab').click()">Proximo <i class="bi bi-arrow-right"></i></button></div>
          </div>

          <div class="tab-pane fade" id="enderecos" role="tabpanel">
            <div class="form-section-heading"><div><span>Opcional</span><h2>Endereco</h2></div><i class="bi bi-geo-alt-fill"></i></div>
            <div class="row g-3">
              <div class="col-md-8"><label class="form-label">Endereco</label><input class="form-control" name="coopendendereco" placeholder="Rua, numero e complemento"></div>
              <div class="col-md-4"><label class="form-label">Bairro</label><input class="form-control" name="coopbairro"></div>
              <div class="col-md-4"><label class="form-label">Cidade</label><input class="form-control" name="coopcidade"></div>
              <div class="col-md-2"><label class="form-label">UF</label><input class="form-control" name="coopestado" maxlength="2"></div>
              <div class="col-md-3"><label class="form-label">CEP</label><input class="form-control" name="coopcep"></div>
              <div class="col-md-3"><label class="form-label">Pais</label><input class="form-control" name="cooppais" value="Brasil"></div>
            </div>
            <div class="d-flex justify-content-between mt-4"><button class="btn btn-outline-primary" type="button" onclick="document.getElementById('dados-cadastrais-tab').click()"><i class="bi bi-arrow-left"></i> Voltar</button><button class="btn btn-primary" type="button" onclick="document.getElementById('dividas-tab').click()">Proximo <i class="bi bi-arrow-right"></i></button></div>
          </div>

          <div class="tab-pane fade" id="dividas" role="tabpanel">
            <div class="form-section-heading"><div><span>Opcional</span><h2>Dividas</h2></div><i class="bi bi-receipt"></i></div>
            <div class="row g-3">
              <div class="col-md-5"><label class="form-label">Descricao</label><input class="form-control" name="dividaDescricao"></div>
              <div class="col-md-2"><label class="form-label">Valor</label><input class="form-control" type="number" step="0.01" name="dividaValor"></div>
              <div class="col-md-3"><label class="form-label">Forma pagto</label><input class="form-control" name="dividaFormaPagto"></div>
              <div class="col-md-2"><label class="form-label">Vencimento</label><input class="form-control" type="date" name="dividaDataVencimento"></div>
              <div class="col-md-3"><label class="form-label">Pagamento</label><input class="form-control" type="date" name="dividaDataPagamento"></div>
            </div>
            <div class="d-flex justify-content-between mt-4"><button class="btn btn-outline-primary" type="button" onclick="document.getElementById('enderecos-tab').click()"><i class="bi bi-arrow-left"></i> Voltar</button><button class="btn btn-primary" type="button" onclick="document.getElementById('cota-parte-tab').click()">Proximo <i class="bi bi-arrow-right"></i></button></div>
          </div>

          <div class="tab-pane fade" id="cota-parte" role="tabpanel">
            <div class="form-section-heading"><div><span>Opcional</span><h2>Cota parte</h2></div><i class="bi bi-pie-chart-fill"></i></div>
            <div class="row g-3">
              <div class="col-md-5"><label class="form-label">Descricao</label><input class="form-control" name="cotaDescricao"></div>
              <div class="col-md-2"><label class="form-label">Valor</label><input class="form-control" type="number" step="0.01" name="cotaValor"></div>
              <div class="col-md-3"><label class="form-label">Forma pagto</label><input class="form-control" name="cotaFormaPagto"></div>
              <div class="col-md-2"><label class="form-label">Vencimento</label><input class="form-control" type="date" name="cotaDataVencimento"></div>
              <div class="col-md-3"><label class="form-label">Pagamento</label><input class="form-control" type="date" name="cotaDataPagamento"></div>
            </div>
            <div class="d-flex justify-content-between mt-4"><button class="btn btn-outline-primary" type="button" onclick="document.getElementById('dividas-tab').click()"><i class="bi bi-arrow-left"></i> Voltar</button><button class="btn btn-primary" type="button" onclick="document.getElementById('telefones-tab').click()">Proximo <i class="bi bi-arrow-right"></i></button></div>
          </div>

          <div class="tab-pane fade" id="telefones" role="tabpanel">
            <div class="form-section-heading"><div><span>Opcional</span><h2>Telefones</h2></div><i class="bi bi-telephone-fill"></i></div>
            <div class="row g-3">
              <div class="col-md-5"><label class="form-label">Numero</label><input class="form-control" name="cooptelnumero" placeholder="(99) 99999-9999"></div>
              <div class="col-md-3"><label class="form-label">Tipo</label><select class="form-select" name="coopteltipo"><option value="CELULAR">Celular</option><option value="RESIDENCIAL">Residencial</option><option value="COMERCIAL">Comercial</option></select></div>
            </div>
            <div class="d-flex gap-2 justify-content-between mt-4"><button class="btn btn-outline-primary" type="button" onclick="document.getElementById('cota-parte-tab').click()"><i class="bi bi-arrow-left"></i> Voltar</button><div class="d-flex gap-2"><a href="/cooperados" class="btn btn-outline-secondary">Cancelar</a><button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Cadastrar Cooperado</button></div></div>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
