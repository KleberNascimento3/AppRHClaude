<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Cadastrar Cooperado')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area" style="max-width:720px">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Novo Cooperado</h1>
        <small>Preencha os dados para cadastrar um cooperado</small>
      </div>
      <a href="/cooperados" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <!-- Form -->
    <div class="card">
      <div class="card-header">
        <i class="bi bi-person-plus-fill"></i> Dados do Cooperado
      </div>
      <div class="card-body">
        <form method="post" data-loading>

          <!-- Hidden: próxima matrícula (mostrado como info, não editável) -->
          <div th:each="cooperado: ${cooperados}" class="mb-4">
            <div class="alert alert-info d-flex align-items-center gap-2" style="font-size:.875rem">
              <i class="bi bi-info-circle-fill"></i>
              Próxima matrícula: <strong th:text="${cooperado.coopmatricula}"></strong>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="coopnome">Nome completo</label>
              <input type="text" class="form-control" id="coopnome"
                     placeholder="Ex: João da Silva Souza"
                     name="coopnome" required>
              <div class="form-text">Informe o nome completo do cooperado.</div>
            </div>

            <div class="col-12">
              <label class="form-label" for="coopnomeguerra">Apelido</label>
              <input type="text" class="form-control" id="coopnomeguerra"
                     placeholder="Ex: João Silva"
                     name="coopnomeguerra" required>
              <div class="form-text">Nome simplificado utilizado no dia a dia.</div>
            </div>
          </div>

          <hr class="section-divider">

          <div class="d-flex gap-2 justify-content-end">
            <a href="/cooperados" class="btn btn-outline-secondary">
              Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Cadastrar Cooperado
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
