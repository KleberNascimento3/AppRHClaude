<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Cota Parte')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area">

    <div th:each="cooperado : ${cooperado}">

      <div class="page-header">
        <div>
          <h1 class="page-title">Cota Parte</h1>
          <small>
            <span th:text="${cooperado.coopnome}"></span>
            &nbsp;·&nbsp; Matrícula: <strong th:text="${cooperado.coopmatricula}"></strong>
          </small>
        </div>
        <a th:href="${(#mvc.url('CC#detalhesCooperado').arg(0, cooperado.coopmatricula)).build()}"
           class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
      </div>

      <div class="card table-card">
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Forma de Pagamento</th>
                <th>Vencimento</th>
                <th>Pagamento</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="c : ${cotaparte}" th:if="${c.coopdatapagamento != null}">
                <td th:text="${c.coopdescricao}"></td>
                <td><span class="fw-semibold" th:text="${{c.coopvalor}}"></span></td>
                <td th:text="${c.coopformapagto}"></td>
                <td th:text="${c.coopdatavencimento}"></td>
                <td>
                  <span class="badge" style="background:#f0fdf4;color:#16a34a"
                        th:text="${c.coopdatapagamento}"></span>
                </td>
              </tr>
              <tr th:if="${cotaparte == null or #lists.size(cotaparte) == 0}">
                <td colspan="5">
                  <div class="empty-state">
                    <i class="bi bi-pie-chart"></i>
                    <p>Nenhuma cota parte encontrada.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div th:if="${soma != null and soma > 0}" class="pagination-wrapper justify-content-end">
          <div class="d-flex align-items-center gap-2">
            <span class="text-muted">Total integralizado:</span>
            <strong style="font-size:1.1rem;color:#16a34a"
                    th:text="${#numbers.formatCurrency(soma)}"></strong>
          </div>
        </div>
      </div>

    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
