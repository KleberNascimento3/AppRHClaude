<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Editar Dívida')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area" style="max-width:720px">

    <div class="page-header">
      <div>
        <h1 class="page-title">Editar Dívida</h1>
        <small>Atualize os dados da dívida do cooperado</small>
      </div>
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="bi bi-receipt me-1"></i> Dados da Dívida
      </div>
      <div class="card-body">
        <form th:action="@{/cooperado/atualizarDividas}" th:object="${dividas}" method="post" data-loading>
          <input type="hidden" th:field="*{coopindexcod}" />

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="coopdescricao">Descrição</label>
              <input type="text" class="form-control" id="coopdescricao"
                     th:field="*{coopdescricao}" required>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="coopformapagto">Forma de Pagamento</label>
              <input type="text" class="form-control" id="coopformapagto"
                     th:field="*{coopformapagto}">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="coopvalor">Valor (R$)</label>
              <input type="number" step="0.01" class="form-control" id="coopvalor"
                     th:field="*{coopvalor}">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="coopdatavencimento">Data de Vencimento</label>
              <input type="date" class="form-control" id="coopdatavencimento"
                     th:field="*{coopdatavencimento}">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="coopdatapagamento">Data de Pagamento</label>
              <input type="date" class="form-control" id="coopdatapagamento"
                     th:field="*{coopdatapagamento}">
              <div class="form-text">Preencha apenas se a dívida já foi paga.</div>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="coopflagcotaparte"
                       th:field="*{coopflagcotaparte}">
                <label class="form-check-label fw-semibold" for="coopflagcotaparte">
                  É Cota-Parte?
                </label>
              </div>
            </div>
          </div>

          <hr class="section-divider">

          <div class="d-flex gap-2 justify-content-end">
            <a th:href="@{/cooperado/listarDividas}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
