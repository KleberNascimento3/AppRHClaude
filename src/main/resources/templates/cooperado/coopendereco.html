<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Endereço')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area">

    <div th:each="cooperado : ${cooperado}">

      <div class="page-header">
        <div>
          <h1 class="page-title">Endereço</h1>
          <small>
            <span th:text="${cooperado.coopnome}"></span>
            &nbsp;·&nbsp; Matrícula: <strong th:text="${cooperado.coopmatricula}"></strong>
          </small>
        </div>
        <a th:href="${(#mvc.url('CC#detalhesCooperado').arg(0, cooperado.coopmatricula)).build()}"
           class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
      </div>

      <div class="card table-card">
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Endereço</th>
                <th>Bairro</th>
                <th>Cidade</th>
                <th>Estado</th>
                <th>CEP</th>
                <th>País</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="e : ${coopendereco}">
                <td th:text="${e.coopendendereco}"></td>
                <td th:text="${e.coopbairro}"></td>
                <td th:text="${e.coopcidade}"></td>
                <td><span class="badge bg-secondary bg-opacity-10 text-secondary" th:text="${e.coopestado}"></span></td>
                <td th:text="${e.coopcep}"></td>
                <td th:text="${e.cooppais}"></td>
              </tr>
              <tr th:if="${coopendereco == null or #lists.size(coopendereco) == 0}">
                <td colspan="6">
                  <div class="empty-state">
                    <i class="bi bi-geo-alt"></i>
                    <p>Nenhum endereço cadastrado.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
