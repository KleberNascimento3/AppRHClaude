<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Cotas Parte')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area">

    <div class="page-header">
      <h1 class="page-title">Cotas Parte</h1>
    </div>

    <div class="card table-card">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Valor</th>
              <th>Forma de Pagamento</th>
              <th>Vencimento</th>
              <th>Pagamento</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${cotapartes}">
              <td th:text="${c.coopdescricao}"></td>
              <td th:text="${{c.coopvalor}}"></td>
              <td th:text="${c.coopformapagto}"></td>
              <td th:text="${c.coopdatavencimento}"></td>
              <td th:text="${c.coopdatapagamento}"></td>
            </tr>
            <tr th:if="${cotapartes == null or #lists.size(cotapartes) == 0}">
              <td colspan="5">
                <div class="empty-state">
                  <i class="bi bi-pie-chart"></i>
                  <p>Nenhuma cota parte encontrada.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div th:if="${cotapartes != null and #lists.size(cotapartes) > 0}"
           class="pagination-wrapper justify-content-end">
        <span class="text-muted">Total:</span>
        <strong th:text="${#numbers.formatCurrency(#aggregates.sum(cotapartes.![coopvalor]))}"></strong>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
