<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{fragments/head :: head('Funcionario da Empresa')}"></th:block></head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div><div th:insert="~{fragments/toast :: toast}"></div>
<div class="main-content"><div class="content-area">
  <div class="page-header"><div><h1 class="page-title" th:text="${modo == 'editar' ? 'Editar funcionário da empresa' : 'Novo funcionário da empresa'}">Funcionário</h1><small>Cadastro da tabela avulsos</small></div><a href="/funcionarios-empresa" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a></div>
  <form th:action="${modo == 'editar'} ? @{/funcionario-empresa/{id}(id=${avulso.id})} : @{/cadastrarFuncionarioEmpresa}" th:object="${avulso}" method="post" class="card p-3" data-loading>
    <div class="row g-3">
      <div class="col-md-3"><label class="form-label">Matrícula</label><input class="form-control" type="number" th:field="*{matricula}"></div>
      <div class="col-md-9"><label class="form-label">Nome</label><input class="form-control" th:field="*{nome}" required></div>
      <div class="col-md-4"><label class="form-label">Função</label><input class="form-control" th:field="*{funcao}"></div>
      <div class="col-md-4"><label class="form-label">Profissional</label><input class="form-control" th:field="*{profissional}"></div>
      <div class="col-md-4"><label class="form-label">Cooperado</label><input class="form-control" th:field="*{cooperado}"></div>
      <div class="col-md-4"><label class="form-label">Data cadastro</label><input class="form-control" type="date" th:field="*{datacadastro}"></div>
      <div class="col-md-4"><label class="form-label">Admissão</label><input class="form-control" type="date" th:field="*{dataadmissao}"></div>
      <div class="col-md-4"><label class="form-label">Demissão</label><input class="form-control" type="date" th:field="*{datademissao}"></div>
      <div class="col-md-4"><label class="form-label">Nascimento</label><input class="form-control" type="date" th:field="*{datanascimento}"></div>
      <div class="col-md-4"><label class="form-label">Celular</label><input class="form-control" th:field="*{telefonecelular}"></div>
      <div class="col-md-4"><label class="form-label">Telefone residencial</label><input class="form-control" th:field="*{telefoneresidencial}"></div>
      <div class="col-md-4"><label class="form-label">Telefone comercial</label><input class="form-control" th:field="*{telefonecomercial}"></div>
      <div class="col-md-8"><label class="form-label">E-mail</label><input class="form-control" type="email" th:field="*{email}"></div>
      <div class="col-md-8"><label class="form-label">Endereço</label><input class="form-control" th:field="*{endereco}"></div>
      <div class="col-md-4"><label class="form-label">Bairro</label><input class="form-control" th:field="*{bairro}"></div>
      <div class="col-md-4"><label class="form-label">Cidade</label><input class="form-control" th:field="*{cidade}"></div>
      <div class="col-md-2"><label class="form-label">UF</label><input class="form-control" maxlength="2" th:field="*{estado}"></div>
      <div class="col-md-3"><label class="form-label">CEP</label><input class="form-control" th:field="*{cep}"></div>
      <div class="col-md-3"><label class="form-label">País</label><input class="form-control" th:field="*{pais}"></div>
      <div class="col-md-3"><label class="form-label">RG</label><input class="form-control" th:field="*{rg}"></div>
      <div class="col-md-3"><label class="form-label">CPF</label><input class="form-control" th:field="*{cpf}"></div>
    </div>
    <div class="d-flex justify-content-end gap-2 mt-3"><a href="/funcionarios-empresa" class="btn btn-outline-secondary">Cancelar</a><button class="btn btn-primary"><i class="bi bi-check2"></i> Salvar</button></div>
  </form>
</div><div th:insert="~{fragments/footer :: footer}"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body></html>
