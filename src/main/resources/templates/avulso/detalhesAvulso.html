<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{fragments/head :: head('Funcionario da Empresa')}"></th:block></head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div><div th:insert="~{fragments/toast :: toast}"></div>
<div class="main-content"><div class="content-area">
  <div class="page-header"><div><h1 class="page-title" th:text="${avulso.nome}">Funcionário</h1><small>Visualização do funcionário da empresa</small></div><div class="d-flex gap-2"><a href="/funcionarios-empresa" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a><a th:href="@{/funcionario-empresa/{id}/editar(id=${avulso.id})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil"></i> Editar</a></div></div>
  <div class="card table-card"><div class="table-responsive"><table class="table"><tbody>
    <tr><th>Matrícula</th><td th:text="${avulso.matricula ?: '-'}"></td><th>Nome</th><td th:text="${avulso.nome ?: '-'}"></td></tr>
    <tr><th>Função</th><td th:text="${avulso.funcao ?: '-'}"></td><th>Profissional</th><td th:text="${avulso.profissional ?: '-'}"></td></tr>
    <tr><th>Celular</th><td th:text="${avulso.telefonecelular ?: '-'}"></td><th>E-mail</th><td th:text="${avulso.email ?: '-'}"></td></tr>
    <tr><th>Endereço</th><td th:text="${avulso.endereco ?: '-'}"></td><th>Bairro</th><td th:text="${avulso.bairro ?: '-'}"></td></tr>
    <tr><th>Cidade</th><td th:text="${avulso.cidade ?: '-'}"></td><th>UF/CEP</th><td th:text="${(avulso.estado ?: '-') + ' / ' + (avulso.cep ?: '-')}"></td></tr>
    <tr><th>RG</th><td th:text="${avulso.rg ?: '-'}"></td><th>CPF</th><td th:text="${avulso.cpf ?: '-'}"></td></tr>
    <tr><th>Admissão</th><td th:text="${avulso.dataadmissao ?: '-'}"></td><th>Demissão</th><td th:text="${avulso.datademissao ?: '-'}"></td></tr>
  </tbody></table></div></div>
</div><div th:insert="~{fragments/footer :: footer}"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body></html>
