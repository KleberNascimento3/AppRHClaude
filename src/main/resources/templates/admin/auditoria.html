<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/head :: head('Auditoria')}"></th:block>
</head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area app-page-shell">
    <div class="page-header app-hero-header">
      <div>
        <span class="page-kicker">Sistema</span>
        <h1 class="page-title">Auditoria</h1>
        <small>Historico de inclusoes, alteracoes e exclusoes registradas no sistema.</small>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header"><i class="bi bi-funnel"></i> Filtros</div>
      <div class="card-body">
        <form th:action="@{/admin/auditoria}" method="get">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">Usuario</label>
              <select class="form-select" name="usuario">
                <option value="">Todos</option>
                <option th:each="usuario : ${usuarios}"
                        th:value="${usuario}"
                        th:text="${usuario}"
                        th:selected="${usuario == usuarioSelecionado}"></option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Matricula</label>
              <input class="form-control" type="number" name="matricula" th:value="${matriculaSelecionada}">
            </div>
            <div class="col-md-3">
              <label class="form-label">Modulo/Tabela</label>
              <select class="form-select" name="tabela">
                <option value="">Todos</option>
                <option th:each="tabela : ${tabelas}"
                        th:value="${tabela}"
                        th:text="${tabela}"
                        th:selected="${tabela == tabelaSelecionada}"></option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Operacao</label>
              <select class="form-select" name="operacao">
                <option value="">Todas</option>
                <option th:each="operacao : ${operacoes}"
                        th:value="${operacao}"
                        th:text="${operacao}"
                        th:selected="${operacao == operacaoSelecionada}"></option>
              </select>
            </div>
            <div class="col-md-2 d-flex gap-2">
              <button class="btn btn-primary flex-fill" type="submit"><i class="bi bi-search"></i> Filtrar</button>
              <a class="btn btn-outline-secondary" href="/admin/auditoria"><i class="bi bi-x-lg"></i></a>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="card table-card">
      <div class="card-header">
        <i class="bi bi-clock-history"></i>
        Registros de auditoria
        <span class="badge bg-primary ms-auto" th:text="${logs != null ? #lists.size(logs) : 0}">0</span>
      </div>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Usuario</th>
              <th>Matricula</th>
              <th>Tabela</th>
              <th>Operacao</th>
              <th>Detalhes</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="log : ${logs}">
              <td th:text="${log.data != null ? #temporals.format(log.data, 'dd/MM/yyyy HH:mm') : ''}"></td>
              <td th:text="${log.usuario}"></td>
              <td><a th:if="${log.coopmatricula != null}" th:href="@{/cooperado/{matricula}(matricula=${log.coopmatricula})}" th:text="${log.coopmatricula}"></a><span th:unless="${log.coopmatricula != null}">-</span></td>
              <td th:text="${log.tabela}"></td>
              <td><span class="badge bg-primary" th:text="${log.operacao}"></span></td>
              <td th:text="${log.detalhes}"></td>
            </tr>
            <tr th:if="${logs == null or #lists.isEmpty(logs)}">
              <td colspan="6" class="empty-state py-4">Nenhum registro de auditoria encontrado.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
