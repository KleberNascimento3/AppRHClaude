<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/head :: head('Usuarios')}"></th:block>
</head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div th:insert="~{fragments/modal-confirm :: modalConfirm}"></div>

<div class="main-content">
  <div class="content-area">
    <div class="page-header">
      <div>
        <h1 class="page-title">Usuarios</h1>
        <small style="color:#64748b;font-size:.875rem">Controle de acesso exclusivo do administrador</small>
      </div>
    </div>

    <div th:if="${mensagem}" class="alert alert-success mb-3">
      <i class="bi bi-check-circle-fill"></i><span th:text="${mensagem}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger mb-3">
      <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${erro}"></span>
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card h-100">
          <div class="card-header"><i class="bi bi-person-plus-fill"></i> Novo usuario</div>
          <div class="card-body">
            <form th:action="@{/admin/usuarios}" method="post" data-loading>
              <div class="mb-3">
                <label class="form-label">Nome de acesso</label>
                <input class="form-control" name="nome" type="text" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" name="email" type="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input class="form-control" name="senha" type="password" minlength="4" required>
              </div>
              <div class="mb-4">
                <label class="form-label">Permissao</label>
                <select class="form-select" name="autorizacao" required>
                  <option value="ROLE_USUARIO">Usuario</option>
                  <option value="ROLE_ADMIN">Administrador</option>
                  <option value="ROLE_DESENVOLVEDOR">Desenvolvedor</option>
                  <option value="ROLE_DEVELOPER">Developer</option>
                </select>
              </div>
              <button class="btn btn-primary w-100 justify-content-center" type="submit">
                <i class="bi bi-plus-circle"></i> Adicionar usuario
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card table-card">
          <div class="card-header"><i class="bi bi-people-fill"></i> Usuarios cadastrados</div>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Usuario</th>
                  <th>Email</th>
                  <th>Permissao</th>
                  <th>Acoes</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="usuario : ${usuarios}">
                  <td class="fw-semibold" th:text="${usuario.nome}"></td>
                  <td th:text="${usuario.email}"></td>
                  <td>
                    <span class="badge" th:classappend="${usuario.administrador} ? ' bg-danger' : (${usuario.desenvolvedor} ? ' bg-warning text-dark' : ' bg-primary')" th:text="${usuario.perfilPrincipal}"></span>
                  </td>
                  <td class="table-actions">
                    <button class="btn btn-sm btn-outline-primary" type="button"
                            data-bs-toggle="collapse" th:attr="data-bs-target=${'#editarUsuario' + usuario.id}">
                      <i class="bi bi-pencil"></i> Editar
                    </button>
                    <button class="btn btn-sm btn-outline-primary" type="button"
                            data-bs-toggle="collapse" th:attr="data-bs-target=${'#senhaUsuario' + usuario.id}">
                      <i class="bi bi-key"></i> Senha
                    </button>
                    <form th:action="@{/admin/usuarios/{id}/excluir(id=${usuario.id})}" method="post" class="d-inline">
                      <button class="btn btn-sm btn-outline-danger" type="submit"
                              onclick="return confirm('Excluir este usuario?')">
                        <i class="bi bi-trash"></i> Excluir
                      </button>
                    </form>
                  </td>
                </tr>
                <tr th:each="usuario : ${usuarios}" class="collapse-row">
                  <td colspan="4" class="p-0 border-0">
                    <div class="collapse" th:id="${'editarUsuario' + usuario.id}">
                      <form th:action="@{/admin/usuarios}" method="post" class="admin-inline-form">
                        <input type="hidden" name="id" th:value="${usuario.id}">
                        <div>
                          <label class="form-label">Nome</label>
                          <input class="form-control" name="nome" th:value="${usuario.nome}" required>
                        </div>
                        <div>
                          <label class="form-label">Email</label>
                          <input class="form-control" name="email" type="email" th:value="${usuario.email}" required>
                        </div>
                        <div>
                          <label class="form-label">Permissao</label>
                          <select class="form-select" name="autorizacao" required>
                            <option value="ROLE_USUARIO" th:selected="${usuario.autorizacaoPrincipal == 'ROLE_USUARIO'}">Usuario</option>
                            <option value="ROLE_ADMIN" th:selected="${usuario.autorizacaoPrincipal == 'ROLE_ADMIN'}">Administrador</option>
                            <option value="ROLE_DESENVOLVEDOR" th:selected="${usuario.autorizacaoPrincipal == 'ROLE_DESENVOLVEDOR' or usuario.autorizacaoPrincipal == 'DESENVOLVEDOR'}">Desenvolvedor</option>
                            <option value="ROLE_DEVELOPER" th:selected="${usuario.autorizacaoPrincipal == 'ROLE_DEVELOPER' or usuario.autorizacaoPrincipal == 'DEVELOPER'}">Developer</option>
                          </select>
                        </div>
                        <button class="btn btn-primary align-self-end" type="submit"><i class="bi bi-check2"></i> Salvar</button>
                      </form>
                    </div>
                    <div class="collapse" th:id="${'senhaUsuario' + usuario.id}">
                      <form th:action="@{/admin/usuarios/{id}/senha(id=${usuario.id})}" method="post" class="admin-inline-form">
                        <div class="flex-grow-1">
                          <label class="form-label">Nova senha</label>
                          <input class="form-control" name="senha" type="password" minlength="4" required>
                        </div>
                        <button class="btn btn-primary align-self-end" type="submit"><i class="bi bi-key-fill"></i> Alterar senha</button>
                      </form>
                    </div>
                  </td>
                </tr>
                <tr th:if="${usuarios == null or #lists.isEmpty(usuarios)}">
                  <td colspan="4" class="empty-state py-4">Nenhum usuario cadastrado.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
