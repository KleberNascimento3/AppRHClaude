<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Acesso Negado')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>

<div class="main-content">
  <div class="content-area d-flex align-items-center justify-content-center" style="min-height:70vh">
    <div class="text-center" style="max-width:420px">
      <div style="width:80px;height:80px;background:#fef2f2;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem">
        <i class="bi bi-shield-x-fill" style="font-size:2.5rem;color:#ef4444"></i>
      </div>
      <h1 style="font-size:1.5rem;font-weight:800;color:#0f172a;margin-bottom:.5rem">Acesso Negado</h1>
      <p class="text-muted mb-4">Você não tem permissão para acessar esta página. Entre em contato com o administrador do sistema se precisar de acesso.</p>
      <div class="d-flex gap-2 justify-content-center">
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
        <a href="/" class="btn btn-primary">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
      </div>
    </div>
  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
