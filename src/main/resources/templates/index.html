<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Dashboard')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div th:insert="~{fragments/modal-confirm :: modalConfirm}"></div>

<div class="main-content">
  <div class="content-area">
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <small style="color:#64748b;font-size:.875rem">Bem-vindo ao sistema AppRH</small>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-xl-3">
        <a href="/cooperados" class="text-decoration-none">
          <div class="stat-card stat-blue">
            <div class="stat-card-icon"><i class="bi bi-person-badge-fill"></i></div>
            <div class="stat-card-info">
              <div class="stat-card-value" th:text="${totalCooperados != null ? totalCooperados : '-'}">-</div>
              <div class="stat-card-label">Cooperados</div>
            </div>
            <i class="bi bi-arrow-right-short ms-auto" style="font-size:1.25rem;opacity:.5"></i>
          </div>
        </a>
      </div>
      <div class="col-sm-6 col-xl-3">
        <a href="/funcionarios" class="text-decoration-none">
          <div class="stat-card stat-green">
            <div class="stat-card-icon"><i class="bi bi-briefcase-fill"></i></div>
            <div class="stat-card-info">
              <div class="stat-card-value" th:text="${totalFuncionarios != null ? totalFuncionarios : '-'}">-</div>
              <div class="stat-card-label">Funcionarios</div>
            </div>
            <i class="bi bi-arrow-right-short ms-auto" style="font-size:1.25rem;opacity:.5"></i>
          </div>
        </a>
      </div>
      <div class="col-sm-6 col-xl-3">
        <a href="/interessados" class="text-decoration-none">
          <div class="stat-card stat-violet">
            <div class="stat-card-icon"><i class="bi bi-star-fill"></i></div>
            <div class="stat-card-info">
              <div class="stat-card-value" th:text="${totalInteressados != null ? totalInteressados : '-'}">-</div>
              <div class="stat-card-label">Interessados</div>
            </div>
            <i class="bi bi-arrow-right-short ms-auto" style="font-size:1.25rem;opacity:.5"></i>
          </div>
        </a>
      </div>
      <div class="col-sm-6 col-xl-3">
        <a href="/relatorios" class="text-decoration-none">
          <div class="stat-card stat-orange">
            <div class="stat-card-icon"><i class="bi bi-file-earmark-bar-graph-fill"></i></div>
            <div class="stat-card-info">
              <div class="stat-card-value">-</div>
              <div class="stat-card-label">Relatorios</div>
            </div>
            <i class="bi bi-arrow-right-short ms-auto" style="font-size:1.25rem;opacity:.5"></i>
          </div>
        </a>
      </div>
    </div>
  </div>

  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>

</body>
</html>
