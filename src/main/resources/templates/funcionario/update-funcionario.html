<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Editar Funcionário')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area" style="max-width:720px">

    <div class="page-header">
      <div>
        <h1 class="page-title">Editar Funcionário</h1>
        <small>Atualize os dados do funcionário abaixo</small>
      </div>
      <a href="/funcionarios" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="bi bi-pencil-square"></i> Dados do Funcionário
      </div>
      <div class="card-body">
        <form method="post" data-loading>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="funcmatricula">Matrícula</label>
              <input type="text" class="form-control" id="funcmatricula"
                     name="funcmatricula" readonly
                     th:attr="value=${funcionario.funcmatricula}">
              <div class="form-text">Somente leitura.</div>
            </div>

            <div class="col-12">
              <label class="form-label" for="funcnome">Nome completo</label>
              <input type="text" class="form-control" id="funcnome"
                     name="funcnome" required
                     th:attr="value=${funcionario.funcnome}">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="funcdata">Data de nascimento</label>
              <input type="date" class="form-control" id="funcdata"
                     name="funcdata" required
                     th:attr="value=${funcionario.funcdata}">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="funcemail">E-mail</label>
              <input type="email" class="form-control" id="funcemail"
                     name="funcemail" required
                     th:attr="value=${funcionario.funcemail}">
            </div>
          </div>

          <hr class="section-divider">

          <div class="d-flex gap-2 justify-content-end">
            <a href="/funcionarios" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
