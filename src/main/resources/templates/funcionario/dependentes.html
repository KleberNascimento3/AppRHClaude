<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Dependentes')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div th:insert="~{fragments/modal-confirm :: modalConfirm}"></div>

<div class="main-content">
  <div class="content-area">

    <div class="page-header">
      <div>
        <h1 class="page-title">Dependentes</h1>
        <small>Gerencie os dependentes do funcionário</small>
      </div>
      <a href="/funcionarios" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="row g-4">
      <!-- Add dependente form -->
      <div class="col-lg-5">
        <div class="card">
          <div class="card-header">
            <i class="bi bi-person-plus-fill"></i> Adicionar Dependente
          </div>
          <div class="card-body">
            <form method="post" data-loading>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label" for="depNome">Nome completo</label>
                  <input type="text" class="form-control" id="depNome"
                         name="nome" placeholder="Nome do dependente" required>
                </div>
                <div class="col-12">
                  <label class="form-label" for="depCpf">CPF</label>
                  <input type="text" class="form-control" id="depCpf"
                         name="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="col-12">
                  <label class="form-label" for="depData">Data de nascimento</label>
                  <input type="date" class="form-control" id="depData"
                         name="datanascimento" required>
                </div>
              </div>
              <hr class="section-divider">
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-plus-lg"></i> Adicionar
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Dependentes list -->
      <div class="col-lg-7">
        <div class="card table-card">
          <div class="card-header">
            <i class="bi bi-people"></i> Dependentes Cadastrados
          </div>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>CPF</th>
                  <th>Data Nasc.</th>
                  <th class="table-actions">Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="dep : ${dependentes}">
                  <td th:text="${dep.nome}"></td>
                  <td th:text="${dep.cpf}"></td>
                  <td th:text="${dep.datanascimento}"></td>
                  <td class="table-actions">
                    <a href="#" data-confirm-delete="este dependente"
                       class="btn btn-sm btn-outline-danger">
                      <i class="bi bi-trash3"></i>
                    </a>
                  </td>
                </tr>
                <tr th:if="${dependentes == null or #lists.size(dependentes) == 0}">
                  <td colspan="4">
                    <div class="empty-state py-3">
                      <i class="bi bi-people"></i>
                      <p>Nenhum dependente cadastrado.</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
