<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Cadastrar Funcionário')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area" style="max-width:720px">

    <div class="page-header">
      <div>
        <h1 class="page-title">Novo Funcionário</h1>
        <small>Preencha os dados para cadastrar um funcionário</small>
      </div>
      <a href="/funcionarios" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="bi bi-person-plus-fill"></i> Dados do Funcionário
      </div>
      <div class="card-body">
        <form method="post" data-loading>

          <!-- Próxima matrícula -->
          <div th:each="funcionario: ${funcionarios}" class="mb-4">
            <div class="alert alert-info d-flex align-items-center gap-2" style="font-size:.875rem">
              <i class="bi bi-info-circle-fill"></i>
              Próxima matrícula: <strong th:text="${funcionario.funcmatricula}"></strong>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="funcnome">Nome completo</label>
              <input type="text" class="form-control" id="funcnome"
                     placeholder="Ex: Maria Aparecida Santos"
                     name="funcnome" required>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="funcdata">Data de nascimento</label>
              <input type="date" class="form-control" id="funcdata"
                     name="funcdata" required>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="funcemail">E-mail</label>
              <input type="email" class="form-control" id="funcemail"
                     placeholder="email@exemplo.com"
                     name="funcemail" required>
            </div>
          </div>

          <hr class="section-divider">

          <div class="d-flex gap-2 justify-content-end">
            <a href="/funcionarios" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Cadastrar Funcionário
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
