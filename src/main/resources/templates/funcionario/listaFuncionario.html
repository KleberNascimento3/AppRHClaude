<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/head :: head('Funcionários')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div th:insert="~{fragments/modal-confirm :: modalConfirm}"></div>

<div class="main-content">
  <div class="content-area">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Funcionários</h1>
        <small>Gerencie os funcionários cadastrados</small>
      </div>
      <a href="/cadastrarFuncionario" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Novo Funcionário
      </a>
    </div>

    <!-- Table -->
    <div class="card table-card">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Matrícula</th>
              <th>Nome</th>
              <th>Data de Nasc.</th>
              <th>E-mail</th>
              <th class="table-actions">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="funcionario : ${funcionarios}">
              <td>
                <span class="fw-semibold" th:text="${funcionario.funcmatricula}"></span>
              </td>
              <td th:text="${funcionario.funcnome}"></td>
              <td th:text="${funcionario.funcdata}"></td>
              <td>
                <a th:if="${funcionario.funcemail != null and !#strings.isEmpty(funcionario.funcemail)}"
                   th:href="'mailto:' + ${funcionario.funcemail}"
                   th:text="${funcionario.funcemail}"
                   class="text-muted" style="font-size:.8125rem"></a>
                <span th:unless="${funcionario.funcemail != null and !#strings.isEmpty(funcionario.funcemail)}"
                      class="text-muted">—</span>
              </td>
              <td class="table-actions">
                <a th:href="${(#mvc.url('FC#detalhesFuncionario').arg(0, funcionario.funcmatricula)).build()}"
                   class="btn btn-sm btn-outline-success" title="Dependentes">
                  <i class="bi bi-people"></i>
                </a>
                <a th:href="${(#mvc.url('FC#editarFuncionario').arg(0, funcionario.funcmatricula)).build()}"
                   class="btn btn-sm btn-outline-secondary" title="Editar">
                  <i class="bi bi-pencil"></i>
                </a>
                <a th:href="${(#mvc.url('FC#deletarFuncionario').arg(0, funcionario.funcmatricula)).build()}"
                   th:attr="data-confirm-delete=${funcionario.funcnome}"
                   class="btn btn-sm btn-outline-danger"
                   sec:authorize="hasRole('ROLE_DEVELOPER')"
                   title="Excluir">
                  <i class="bi bi-trash3"></i>
                </a>
              </td>
            </tr>
            <tr th:if="${funcionarios == null or #lists.size(funcionarios) == 0}">
              <td colspan="5">
                <div class="empty-state">
                  <i class="bi bi-briefcase"></i>
                  <p>Nenhum funcionário encontrado.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
