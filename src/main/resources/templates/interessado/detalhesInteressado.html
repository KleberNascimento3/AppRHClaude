<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{fragments/head :: head('Detalhes do Interessado')}"></th:block></head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div><div th:insert="~{fragments/toast :: toast}"></div>
<div class="main-content"><div class="content-area">
  <div class="page-header"><div><h1 class="page-title" th:text="${interessado.funcpronome}">Interessado</h1><small>Visualização do interessado</small></div><div class="d-flex gap-2"><a href="/interessados" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a><a th:href="@{/interessado/{id}/editar(id=${interessado.funcproindex})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil"></i> Editar</a></div></div>
  <div class="card table-card"><div class="table-responsive"><table class="table"><tbody>
    <tr><th>Nome</th><td th:text="${interessado.funcpronome}"></td><th>Cadastro</th><td th:text="${interessado.datacadastro ?: '-'}"></td></tr>
    <tr><th>Celular</th><td th:text="${interessado.funcprotelefone ?: '-'}"></td><th>E-mail</th><td th:text="${interessado.funcproemail ?: '-'}"></td></tr>
    <tr><th>Endereço</th><td th:text="${interessado.funcproendereco ?: '-'}"></td><th>Bairro</th><td th:text="${interessado.bairro ?: '-'}"></td></tr>
    <tr><th>Cidade</th><td th:text="${interessado.cidade ?: '-'}"></td><th>UF/CEP</th><td th:text="${(interessado.estado ?: '-') + ' / ' + (interessado.cep ?: '-')}"></td></tr>
    <tr><th>RG</th><td th:text="${interessado.rg ?: '-'}"></td><th>CPF</th><td th:text="${interessado.cpf ?: '-'}"></td></tr>
    <tr><th>Classificação</th><td th:text="${interessado.ocupacao ?: '-'}"></td><th>Restrição</th><td th:text="${interessado.restricao ?: '-'}"></td></tr>
  </tbody></table></div></div>
</div><div th:insert="~{fragments/footer :: footer}"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body></html>
