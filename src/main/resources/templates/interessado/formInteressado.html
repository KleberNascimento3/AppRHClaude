<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{fragments/head :: head('Interessado')}"></th:block></head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div><div th:insert="~{fragments/toast :: toast}"></div>
<div class="main-content"><div class="content-area">
  <div class="page-header"><div><h1 class="page-title" th:text="${modo == 'editar' ? 'Editar interessado' : 'Novo interessado'}">Interessado</h1><small>Dados cadastrais do interessado</small></div><a href="/interessados" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a></div>
  <form th:action="${modo == 'editar'} ? @{/interessado/{id}(id=${interessado.funcproindex})} : @{/cadastrarInteressado}" th:object="${interessado}" method="post" class="card p-3" data-loading>
    <div class="row g-3">
      <div class="col-md-8"><label class="form-label">Nome</label><input class="form-control" th:field="*{funcpronome}" required></div>
      <div class="col-md-4"><label class="form-label">Data cadastro</label><input class="form-control" type="date" th:field="*{datacadastro}"></div>
      <div class="col-md-4"><label class="form-label">Nascimento</label><input class="form-control" type="date" th:field="*{funcprodatanascimento}"></div>
      <div class="col-md-4"><label class="form-label">Celular</label><input class="form-control" th:field="*{funcprotelefone}"></div>
      <div class="col-md-4"><label class="form-label">Telefone residencial</label><input class="form-control" th:field="*{telefoneresidencial}"></div>
      <div class="col-md-4"><label class="form-label">Telefone comercial</label><input class="form-control" th:field="*{telefonecomercial}"></div>
      <div class="col-md-8"><label class="form-label">E-mail</label><input class="form-control" type="email" th:field="*{funcproemail}"></div>
      <div class="col-md-8"><label class="form-label">Endereço</label><input class="form-control" th:field="*{funcproendereco}"></div>
      <div class="col-md-4"><label class="form-label">Bairro</label><input class="form-control" th:field="*{bairro}"></div>
      <div class="col-md-4"><label class="form-label">Cidade</label><input class="form-control" th:field="*{cidade}"></div>
      <div class="col-md-2"><label class="form-label">UF</label><input class="form-control" maxlength="2" th:field="*{estado}"></div>
      <div class="col-md-3"><label class="form-label">CEP</label><input class="form-control" th:field="*{cep}"></div>
      <div class="col-md-3"><label class="form-label">País</label><input class="form-control" th:field="*{pais}"></div>
      <div class="col-md-3"><label class="form-label">RG</label><input class="form-control" th:field="*{rg}"></div>
      <div class="col-md-3"><label class="form-label">CPF</label><input class="form-control" th:field="*{cpf}"></div>
      <div class="col-md-3"><label class="form-label">Escolaridade</label><input class="form-control" th:field="*{escolaridade}"></div>
      <div class="col-md-3"><label class="form-label">Estado civil</label><input class="form-control" th:field="*{estadoCivil}"></div>
      <div class="col-md-2"><label class="form-label">Sexo</label><input class="form-control" th:field="*{sexo}"></div>
      <div class="col-md-4"><label class="form-label">Classificação</label><input class="form-control" th:field="*{ocupacao}"></div>
      <div class="col-md-6"><label class="form-label">Restrição</label><input class="form-control" th:field="*{restricao}"></div>
      <div class="col-md-6"><label class="form-label">Obs. restrição</label><input class="form-control" th:field="*{obsrestricao}"></div>
    </div>
    <div class="d-flex justify-content-end gap-2 mt-3"><a href="/interessados" class="btn btn-outline-secondary">Cancelar</a><button class="btn btn-primary"><i class="bi bi-check2"></i> Salvar</button></div>
  </form>
</div><div th:insert="~{fragments/footer :: footer}"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body></html>
