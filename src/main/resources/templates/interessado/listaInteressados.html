<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Interessados')}"></th:block>
</head>
<body>

<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>

<div class="main-content">
  <div class="content-area">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Interessados</h1>
        <small>Candidatos com interesse em se tornar cooperados</small>
      </div>
      <a href="/cadastrarInteressado" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Novo Interessado
      </a>
    </div>

    <!-- Search -->
    <form method="post" class="search-box" data-loading>
      <div>
        <label class="form-label">Status</label>
        <select name="nome" id="nome" class="form-select" style="min-width:160px">
          <option value="">Todos</option>
          <option value="all">Todos</option>
          <option value="ativos">Ativos</option>
          <option value="inativos">Inativos</option>
        </select>
      </div>
      <div style="flex:1;min-width:200px">
        <label class="form-label">Buscar</label>
        <input class="form-control" type="search"
               placeholder="Nome ou e-mail..."
               name="buscar" id="buscar">
      </div>
      <button class="btn btn-primary" type="submit" style="align-self:flex-end">
        <i class="bi bi-search"></i> Pesquisar
      </button>
    </form>

    <!-- Table -->
    <div class="card table-card">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="interessado: ${interessados}">
              <td th:text="${interessado.funcpronome}"></td>
              <td>
                <a th:if="${interessado.funcproemail != null and !#strings.isEmpty(interessado.funcproemail)}"
                   th:href="'mailto:' + ${interessado.funcproemail}"
                   th:text="${interessado.funcproemail}"
                   class="text-muted" style="font-size:.8125rem"></a>
                <span th:unless="${interessado.funcproemail != null and !#strings.isEmpty(interessado.funcproemail)}"
                      class="text-muted">—</span>
              </td>
            </tr>
            <tr th:if="${interessados == null or #lists.size(interessados) == 0}">
              <td colspan="2">
                <div class="empty-state">
                  <i class="bi bi-star"></i>
                  <p>Nenhum interessado encontrado.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
