<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{fragments/head :: head('Interessados')}"></th:block></head>
<body>
<div th:insert="~{fragments/menu :: menu}"></div>
<div th:insert="~{fragments/toast :: toast}"></div>
<div class="main-content"><div class="content-area">
  <div class="page-header">
    <div><h1 class="page-title">Interessados</h1><small>Candidatos com interesse em se tornar cooperados</small></div>
    <a href="/cadastrarInteressado" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Novo Interessado</a>
  </div>
  <form method="post" class="search-box" data-loading>
    <div style="flex:1;min-width:220px"><label class="form-label">Buscar</label><input class="form-control" type="search" placeholder="Nome, e-mail ou telefone..." name="buscar" th:value="${buscar}"></div>
    <button class="btn btn-primary" type="submit" style="align-self:flex-end"><i class="bi bi-search"></i> Pesquisar</button>
    <a href="/interessados" class="btn btn-outline-secondary" style="align-self:flex-end"><i class="bi bi-x-lg"></i></a>
  </form>
  <div class="card table-card"><div class="table-responsive"><table class="table">
    <thead><tr><th>Nome</th><th>Celular</th><th>E-mail</th><th>Cidade</th><th class="table-actions">Ações</th></tr></thead>
    <tbody>
      <tr th:each="interessado: ${interessados}">
        <td><a th:href="@{/interessado/{id}(id=${interessado.funcproindex})}" th:text="${interessado.funcpronome}" class="fw-semibold"></a></td>
        <td th:text="${interessado.funcprotelefone ?: '-'}"></td>
        <td><a th:if="${interessado.funcproemail != null and !#strings.isEmpty(interessado.funcproemail)}" th:href="'mailto:' + ${interessado.funcproemail}" th:text="${interessado.funcproemail}"></a><span th:unless="${interessado.funcproemail != null and !#strings.isEmpty(interessado.funcproemail)}">-</span></td>
        <td th:text="${interessado.cidade ?: '-'}"></td>
        <td class="table-actions">
          <a th:href="@{/interessado/{id}(id=${interessado.funcproindex})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
          <a th:href="@{/interessado/{id}/editar(id=${interessado.funcproindex})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
          <form th:action="@{/interessado/{id}/excluir(id=${interessado.funcproindex})}" method="post" class="d-inline"><button class="btn btn-sm btn-outline-danger" onclick="return confirm('Excluir interessado?')"><i class="bi bi-trash"></i></button></form>
        </td>
      </tr>
      <tr th:if="${interessados == null or #lists.size(interessados) == 0}"><td colspan="5"><div class="empty-state"><i class="bi bi-star"></i><p>Nenhum interessado encontrado.</p></div></td></tr>
    </tbody>
  </table></div></div>
</div><div th:insert="~{fragments/footer :: footer}"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body></html>
